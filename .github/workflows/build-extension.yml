name: Build Extension Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/zipball/${{ github.sha }}" \
            -o source.zip
          unzip -q source.zip -d source
          SOURCE_ROOT=$(ls -d source/* | head -n 1)
          cp "$SOURCE_ROOT/manifest.json" .
          cp "$SOURCE_ROOT/background.js" .
          cp "$SOURCE_ROOT/content.js" .
          cp "$SOURCE_ROOT/popup.html" .
          cp "$SOURCE_ROOT/popup.css" .
          cp "$SOURCE_ROOT/popup.js" .

      - name: Read extension version
        id: meta
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create extension zip
        run: |
          mkdir -p dist
          ZIP_NAME="Twitter-Xcroller-v${{ steps.meta.outputs.version }}.zip"
          zip -r "dist/$ZIP_NAME" \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.css \
            popup.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-bundle-v${{ steps.meta.outputs.version }}
          path: dist/*.zip
          if-no-files-found: error
