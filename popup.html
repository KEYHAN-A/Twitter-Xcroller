<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Scroller</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <h1>X-Scroller</h1>
        <span id="statusPill" class="status-pill">Checking...</span>
      </header>

      <label class="row checkbox">
        <input id="enabled" type="checkbox" />
        <span>Enable automation</span>
      </label>

      <label class="row checkbox">
        <input id="autoStartOnLoad" type="checkbox" />
        <span>Auto-start on page load</span>
      </label>

      <label class="row checkbox">
        <input id="pauseOnHidden" type="checkbox" />
        <span>Pause when tab is hidden</span>
      </label>

      <label class="row checkbox">
        <input id="preferNewPostsButton" type="checkbox" />
        <span>Prefer "new posts" button over reload</span>
      </label>

      <section class="section">
        <label for="baseStepPx">Scroll speed</label>
        <input id="baseStepPx" type="range" min="0.5" max="8" step="0.1" />
        <div id="speedValue" class="hint">1.4 px/tick</div>
      </section>

      <section class="section two-col">
        <label>
          Min reload (min)
          <input id="minReloadMinutes" type="number" min="0.5" max="240" step="0.5" />
        </label>
        <label>
          Max reload (min)
          <input id="maxReloadMinutes" type="number" min="0.5" max="240" step="0.5" />
        </label>
      </section>

      <section class="section two-col">
        <label>
          Tick ms
          <input id="tickMs" type="number" min="30" max="500" step="5" />
        </label>
        <label>
          Start delay (sec)
          <input id="startupDelaySec" type="number" min="0" max="60" step="1" />
        </label>
      </section>

      <div id="countdown" class="countdown">Next reload: --</div>

      <footer class="actions">
        <button id="saveButton">Save</button>
        <button id="applyButton" class="primary">Apply to tab</button>
        <button id="toggleButton">Start</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
