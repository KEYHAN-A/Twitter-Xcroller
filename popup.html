<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Scroller</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <div>
          <h1>X-Scroller</h1>
          <p id="statusDetail" class="subtle">Checking active tab...</p>
        </div>
        <span id="statusPill" class="status-pill">Checking...</span>
      </header>

      <section class="card toggles">
        <label class="row checkbox">
          <input id="enabled" type="checkbox" />
          <span>Enable automation</span>
        </label>
        <label class="row checkbox">
          <input id="autoStartOnLoad" type="checkbox" />
          <span>Auto-start on page load</span>
        </label>
        <label class="row checkbox">
          <input id="pauseOnHidden" type="checkbox" />
          <span>Pause when tab is hidden</span>
        </label>
        <label class="row checkbox">
          <input id="preferNewPostsButton" type="checkbox" />
          <span>Prefer "new posts" over full reload</span>
        </label>
      </section>

      <section class="card section">
        <label for="interactionMode">Mouse interaction mode</label>
        <select id="interactionMode">
          <option value="auto_resume_on_mouse">Pause briefly, then auto-resume</option>
          <option value="manual_resume_on_mouse">Pause until I click Continue</option>
        </select>
      </section>

      <section class="card section">
        <label for="baseStepPx">Scroll speed</label>
        <input id="baseStepPx" type="range" min="0.5" max="8" step="0.1" />
        <div id="speedValue" class="hint">1.4 px/tick</div>
      </section>

      <section class="card section two-col">
        <label>
          Min reload (min)
          <input id="minReloadMinutes" type="number" min="0.5" max="240" step="0.5" />
        </label>
        <label>
          Max reload (min)
          <input id="maxReloadMinutes" type="number" min="0.5" max="240" step="0.5" />
        </label>
      </section>

      <section class="card section two-col">
        <label>
          Tick ms
          <input id="tickMs" type="number" min="30" max="500" step="5" />
        </label>
        <label>
          Start delay (sec)
          <input id="startupDelaySec" type="number" min="0" max="60" step="1" />
        </label>
      </section>

      <div id="countdown" class="countdown">Next reload: --</div>
      <div id="guidance" class="guidance" role="status"></div>

      <footer class="actions">
        <button id="saveButton">Save</button>
        <button id="applyButton" class="primary">Apply to tab</button>
        <button id="toggleButton" class="primary-soft">Start</button>
      </footer>
      <button id="resumeButton" class="resume-button" hidden>Continue in tab</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
